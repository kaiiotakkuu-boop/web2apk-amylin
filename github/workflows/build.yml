name: Build APK from ZIP

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: 'URL ZIP Project Flutter'
        required: true
        type: string
      output_name:
        description: 'Nama File APK Output'
        required: false
        default: 'app-release.apk'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download and extract ZIP
        run: |
          curl -L "${{ github.event.inputs.zip_url }}" -o project.zip
          unzip -q project.zip -d workspace/
          ls -la workspace/

      - name: Find Flutter project root
        id: find_root
        run: |
          ROOT_DIR=$(find workspace -name "pubspec.yaml" -type f | head -1 | xargs dirname)
          if [ -z "$ROOT_DIR" ]; then
            echo "❌ pubspec.yaml not found!"
            exit 1
          fi
          echo "root_dir=$ROOT_DIR" >> $GITHUB_OUTPUT

      - name: Clean and get packages
        run: |
          cd ${{ steps.find_root.outputs.root_dir }}
          flutter clean
          flutter pub get

      - name: Build release APK
        run: |
          cd ${{ steps.find_root.outputs.root_dir }}
          flutter build apk --release

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.output_name }}
          path: ${{ steps.find_root.outputs.root_dir }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7
