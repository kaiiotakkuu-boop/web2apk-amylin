name: Build APK from ZIP

on:
  workflow_dispatch:
    inputs:
      zip_url:
        description: URL ZIP Project Flutter (Direct Link)
        required: true
        type: string
      output_name:
        description: Nama File APK Output
        required: false
        default: app-release.apk
        type: string

jobs:
  build:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.22.0
          channel: stable
          cache: true

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download and extract ZIP
        id: download
        run: |
          echo "Downloading ZIP from: ${{ github.event.inputs.zip_url }}"
          curl -f -L "${{ github.event.inputs.zip_url }}" -o project.zip
          if [ $? -ne 0 ]; then
            echo "Failed to download ZIP file"
            exit 1
          fi
          unzip -q project.zip -d workspace/
          echo "Extracted files:"
          ls -la workspace/

      - name: Find Flutter project root
        id: find_root
        run: |
          ROOT_DIR=$(find workspace -name "pubspec.yaml" -type f -print -quit | xargs dirname)
          if [ -z "$ROOT_DIR" ]; then
            echo "::error::pubspec.yaml not found in the uploaded ZIP!"
            echo "Make sure your ZIP contains a Flutter project with pubspec.yaml"
            exit 1
          fi
          echo "Found Flutter project at: $ROOT_DIR"
          echo "root_dir=$ROOT_DIR" >> $GITHUB_OUTPUT

      - name: Cache Flutter dependencies
        uses: actions/cache@v4
        with:
          path: |
            ${{ steps.find_root.outputs.root_dir }}/.pub-cache
            ${{ steps.find_root.outputs.root_dir }}/.dart_tool
          key: flutter-pub-${{ hashFiles('${{ steps.find_root.outputs.root_dir }}/pubspec.lock') }}
          restore-keys: flutter-pub-

      - name: Clean and get packages
        run: |
          cd "${{ steps.find_root.outputs.root_dir }}"
          flutter clean
          flutter pub get

      - name: Build release APK
        run: |
          cd "${{ steps.find_root.outputs.root_dir }}"
          flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ github.event.inputs.output_name }}
          path: ${{ steps.find_root.outputs.root_dir }}/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 7

      - name: Upload debug logs (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-logs
          path: ${{ steps.find_root.outputs.root_dir }}/build/
          retention-days: 3
